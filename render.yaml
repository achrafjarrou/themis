services:
  - type: web
    name: themis
    env: python
    region: frankfurt
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port 8000
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: DB_PATH
        value: /app/data/checkpoints/themis.db
      - key: UPLOAD_DIR
        value: /app/data/uploads
      - key: LOG_LEVEL
        value: INFO
      - key: PYTHON_VERSION
        value: 3.11.0

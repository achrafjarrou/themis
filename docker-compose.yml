version: "3.9"

services:

  # ── Qdrant vector DB ──────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: themis-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  # ── FastAPI backend ───────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: themis-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - QDRANT_URL=http://qdrant:6333
      - OLLAMA_URL=http://host.docker.internal:11434
      - LANGFUSE_HOST=http://langfuse:3000
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-local}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-local}
    volumes:
      - ./data:/app/data
    depends_on:
      - qdrant
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── React frontend ────────────────────────────────────────────────
  ui:
    build:
      context: ./themis-ui
      dockerfile: Dockerfile.ui
    container_name: themis-ui
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - api

  # ── Langfuse observability (optional) ────────────────────────────
  langfuse:
    image: langfuse/langfuse:latest
    container_name: themis-langfuse
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://langfuse:langfuse@langfuse-db:5432/langfuse
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=themis-secret-change-in-prod
      - SALT=themis-salt-change-in-prod
    depends_on:
      - langfuse-db

  langfuse-db:
    image: postgres:15-alpine
    container_name: themis-langfuse-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse
      POSTGRES_DB: langfuse
    volumes:
      - langfuse_db:/var/lib/postgresql/data

volumes:
  qdrant_data:
  langfuse_db:

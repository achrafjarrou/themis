[phases.setup]
nixPkgs = ["tesseract", "python311"]

[phases.install]
cmds = ["pip install -r requirements.txt"]

[phases.build]
cmds = ["python -c \"from sentence_transformers import SentenceTransformer; SentenceTransformer('all-MiniLM-L6-v2')\""]

[start]
cmd = "uvicorn api.main:app --host 0.0.0.0 --port 8000"

[phases.setup]
aptPkgs = ["tesseract-ocr", "tesseract-ocr-eng", "libgl1", "libglib2.0-0", "gcc"]

[phases.install]
cmds = ["pip install --no-cache-dir -r requirements.txt"]

[phases.build]
cmds = [
    "python -c \"from sentence_transformers import SentenceTransformer; SentenceTransformer('all-MiniLM-L6-v2')\" || true",
    "mkdir -p data/uploads data/checkpoints data/qdrant_db"
]

[start]
cmd = "uvicorn api.main:app --host 0.0.0.0 --port 8000"
